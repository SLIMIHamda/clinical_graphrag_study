# Neo4j for the grounded graph. Data + indices persist on the Network Volume so
# the graph survives pod teardown. Heap/page-cache sized for an A100 host
# (Doc 00 section 5: heap >= 16G, page-cache sized to the vector index).
services:
  neo4j:
    image: neo4j:5.23-community
    container_name: cgs-neo4j
    ports:
      - "7474:7474"   # browser
      - "7687:7687"   # bolt
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-please-change-me}"
      NEO4J_server_memory_heap_initial__size: "16G"
      NEO4J_server_memory_heap_max__size: "16G"
      NEO4J_server_memory_pagecache_size: "16G"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - /vol/graph/neo4j/data:/data
      - /vol/graph/neo4j/logs:/logs
    restart: unless-stopped
